name: release

on:
  push:
    branches: [main]

# Never cancel an in-progress publish midway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version PR branch, create git tags & GitHub releases
  pull-requests: write # open / update the "Version Packages" PR
  id-token: write # npm provenance (requires a public repo)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If there are pending changesets, this opens/updates a "Version Packages"
      # PR. When that PR is merged (push to main with no changesets left), it
      # builds and publishes to npm instead.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run pub:version
          publish: pnpm run pub:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

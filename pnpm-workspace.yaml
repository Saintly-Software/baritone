# Supply-chain security hardening — see https://pnpm.io/supply-chain-security

# Block risky postinstall scripts: only these explicitly-trusted dependencies
# may run build/postinstall scripts. Everything else is blocked by default.
allowBuilds:
  esbuild: true

# Prevent transitive dependencies from being resolved from exotic sources
# (git repos, direct tarball URLs) instead of the registry.
blockExoticSubdeps: true

# Delay installing newly published versions until they are at least this many
# minutes old (1 day), giving time for malicious releases to be detected.
# This is the pnpm v11 default, set explicitly to document intent.
minimumReleaseAge: 1440

# Refuse to install a package whose trust level has decreased compared to
# previous releases (e.g. lost publisher provenance).
trustPolicy: no-downgrade

# Packages exempted from the trust-downgrade check. semver 6.x was published in
# ~2019, years before provenance attestation existed, so it has no trust evidence
# to "downgrade" from. It's pulled in transitively by @babel/core via
# @vitejs/plugin-react.
trustPolicyExclude:
  - 'semver@6.3.1'

# Force the whole dependency tree (including transitive deps) onto the latest
# undici-types v6.
overrides:
  undici-types: ^6.27.0
